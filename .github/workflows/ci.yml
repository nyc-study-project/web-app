name: web-app CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm ci || npm install

      - name: Build
        run: |
          npm run build

      - name: Run tests
        run: |
          if [ -f package.json ]; then npm test -- --watch=false || echo "No tests defined, skipping"; fi

