name: web-app CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            echo "package.json found, installing dependencies..."
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
          else
            echo "No package.json found, skipping npm install."
          fi

      - name: Build app (if package.json exists)
        run: |
          if [ -f package.json ]; then
            echo "Running npm run build..."
            npm run build || echo "Build failed or not configured; continuing."
          else
            echo "No package.json found, skipping build."
          fi

      - name: Run tests (if package.json exists)
        run: |
          if [ -f package.json ]; then
            echo "Running npm test..."
            npm test -- --watch=false || echo "Tests failed or not configured; continuing."
          else
            echo "No package.json found, skipping tests."
          fi

